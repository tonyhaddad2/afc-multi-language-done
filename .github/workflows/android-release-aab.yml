name: Build be lahza Release AAB

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Write google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json

      - name: Decode release keystore
        run: |
          echo "${{ secrets.BE_LAHZA_KEYSTORE_BASE64 }}" | base64 -d > /tmp/be-lahza-release.jks

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build release AAB
        env:
          BE_LAHZA_KEYSTORE_PATH: /tmp/be-lahza-release.jks
          BE_LAHZA_KEYSTORE_PASSWORD: ${{ secrets.BE_LAHZA_KEYSTORE_PASSWORD }}
          BE_LAHZA_KEY_ALIAS: ${{ secrets.BE_LAHZA_KEY_ALIAS }}
          BE_LAHZA_KEY_PASSWORD: ${{ secrets.BE_LAHZA_KEY_PASSWORD }}
        run: gradle :app:bundleRelease --stacktrace

      - name: Build release APK
        env:
          BE_LAHZA_KEYSTORE_PATH: /tmp/be-lahza-release.jks
          BE_LAHZA_KEYSTORE_PASSWORD: ${{ secrets.BE_LAHZA_KEYSTORE_PASSWORD }}
          BE_LAHZA_KEY_ALIAS: ${{ secrets.BE_LAHZA_KEY_ALIAS }}
          BE_LAHZA_KEY_PASSWORD: ${{ secrets.BE_LAHZA_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: be-lahza-v90-release-aab-apk
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
