app = "be-lahza-backend"
primary_region = "fra"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  ALLOW_DEV_AUTH = "false"
  FIELD_ENCRYPTION_KEY_ID = "primary-v1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Set with: fly secrets set PHONE_LOOKUP_HMAC_SECRET=...
