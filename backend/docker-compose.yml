services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: belahza
      POSTGRES_PASSWORD: belahza_dev_password
      POSTGRES_DB: belahza
    ports:
      - "5432:5432"
    volumes:
      - belahza_pg:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
volumes:
  belahza_pg:
